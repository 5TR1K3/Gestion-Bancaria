<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css"> 
    <meta charset="UTF-8" />
    <title>Banco</title>
    <script src="https://kit.fontawesome.com/cc1360aee1.js" crossorigin="anonymous"></script></head>
<body>
    <div class="container">
        <div class="row">
            <!-- Seccion 1-->
            <div class="col-sm-6 col-xs-6">
                <h1 style="font-size:300%;">Pagina de perfil</h1>
                <form action="">
                    <label for="fname">Nombre de cuenta</label><br>
                    <input type="text" id="fname" name="fname"><br>
                    <label for="lname">Correo</label><br>
                    <input type="text" id="lname" name="lname"><br>
                    <label for="lname">Direccion</label><br>
                    <input type="text" id="lname" name="lname"><br>
                    <label for="lname">Lugar de trabajo</label><br>
                    <input type="text" id="lname" name="lname"><br>
                    <label for="lname">Telefono</label><br>
                    <input type="number" id="lname" name="lname"><br>
                </form>
            </div>
            <!-- Seccion 2, en blanco (divisora) -->
            <div class="col-sm-2 col-xs-2" >
                
            </div>
            <!-- Seccion 3 -->
            <div class="col-sm-4 col-xs-4">
                <i style="font-size:300%; float:right;" class="fa-solid fa-landmark"></i><br><br><br>
                <form action="">
                    <label for="fname">Pais</label><br>
                    <input type="text" id="fname" name="fname"><br>
                    <label for="lname">Departamento</label><br>
                    <input type="text" id="lname" name="lname"><br>
                    <label for="lname">Ciudad</label><br>
                    <input type="text" id="lname" name="lname"><br>
                    <label for="lname">Dui</label><br>
                    <input type="text" id="lname" name="lname"><br>
                    <div class="container"> 
                        <div class="row">
                            <div class="col-sm-6 col-xl-6"  style="float: left;">
    
                                <div class="submit">
                                    <input type="submit" value="Cancelar" id="form_button" />
                                </div>
                            
                            </div>
                            <div class="col-sm-6 col-xl-6"  style="float: right;">
    
                                <div class="submit">
                                    <input type="submit" value="Guardar" id="form_button" />
                                </div>
    
                            </div>
                        </div>    
                    </div>
               </form>
            </div>
        </div>
    </div>
    
</body>
</html>
